<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

        body {
            background-color: #0f1115; /* Softened from pitch black */
            color: #d1d5db;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 4rem 1rem;
            -webkit-font-smoothing: antialiased;
        }

        .main-card, .history-card {
            background-color: #1a1d23; /* Deep slate instead of pure black */
            border: 1px solid #2d333b; /* Slightly more visible borders */
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8), 
                        0 0 50px -10px rgba(255, 85, 85, 0.05);
            position: relative;
        }

        .main-card {
            padding: 1.25rem 1.75rem 2.25rem 1.75rem;
            z-index: 2;
        }

        .history-card {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 20px;
        }

        #historyList {
            max-height: 180px;
            overflow-y: auto;
            padding-right: 6px;
        }

        #historyList::-webkit-scrollbar {
            width: 2px;
        }
        #historyList::-webkit-scrollbar-track {
            background: transparent;
        }
        #historyList::-webkit-scrollbar-thumb {
            background: #2d333b;
            border-radius: 10px;
        }
        #historyList::-webkit-scrollbar-thumb:hover {
            background: #FF5555;
        }

        .typewriter-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            display: inline-block;
            position: relative;
        }

        .secured-label {
            display: inline-block;
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
            background-color: transparent;
            padding: 3px 12px;
            border-radius: 999px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
            font-size: 8px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 0.75rem;
        }

        .tab-btn {
            color: #71717a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 11px;
            letter-spacing: 0.02em;
            font-weight: 500;
        }

        .tab-btn.active {
            color: #ffffff;
            background-color: #2d333b;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.03);
        }

        .output-box {
            background-color: #0f1115;
            border: 1px solid #2d333b;
            font-family: 'JetBrains Mono', monospace;
            min-height: 80px;
            width: 100%;
            margin-bottom: 1.5rem;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 18px;
            padding: 1.25rem;
        }
        
        .output-box:hover {
            border-color: rgba(255, 85, 85, 0.6);
            box-shadow: 0 0 30px rgba(255, 85, 85, 0.1), inset 0 0 10px rgba(255, 85, 85, 0.05);
            transform: scale(1.01);
        }

        #passwordOutput {
            user-select: none;
            word-break: break-all;
            line-height: 1.4;
            transition: font-size 0.3s ease;
            width: 100%;
            text-align: center;
            color: white;
            letter-spacing: 0.1em;
        }

        .copy-hint-icon {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 10px;
            color: #FF5555;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(-5px);
        }

        .output-box:hover .copy-hint-icon {
            opacity: 0.8;
            transform: translateY(0);
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.8rem;
            background: #1e2229;
            border: 1px solid #2d333b;
            border-radius: 10px;
            margin-bottom: 0.4rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        .history-item:hover {
            border-color: #FF5555;
            background: #252a33;
        }

        .history-text {
            font-size: 10px;
            color: #9ca3af;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 280px;
        }

        .history-copy-icon {
            font-size: 9px;
            color: #4b5563;
        }

        .history-item:hover .history-copy-icon {
            color: #FF5555;
        }

        .strength-segment {
            height: 2px;
            flex: 1;
            background-color: #2d333b;
            border-radius: 1px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 2px;
            background: #2d333b;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #FF5555;
            border-radius: 50%;
            border: 1px solid #000;
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.6);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .precision-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #2d333b;
            border: 1px solid #2d333b;
            border-radius: 16px;
            overflow: hidden;
        }

        .grid-cell {
            background: #1a1d23;
            padding: 1rem 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .cell-label-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a3a3a3;
        }

        .cell-label, .main-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11.6px;
            font-weight: 700;
            text-transform: none;
            letter-spacing: 0.05em;
        }

        .cell-icon { font-size: 11px; opacity: 0.9; }

        .cell-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .step-btn {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-size: 8px;
            border: 1px solid #2d333b;
            border-radius: 6px;
            transition: all 0.2s ease;
            background: #252a33;
        }
        
        .step-btn:hover:not(:disabled) {
            border-color: #FF5555;
            color: #FF5555;
            box-shadow: 0 0 10px rgba(255, 85, 85, 0.1);
        }

        .cell-val {
            min-width: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            color: #FF5555;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 0 10px rgba(255, 85, 85, 0.4);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            background: #fff;
            color: #000;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            transform: translateY(100px);
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 50;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="main-card">
        <header class="text-center mb-6">
            <h1 class="typewriter-title">Password Generator</h1>
            <div>
                <span class="secured-label">Web Crypto API Secured</span>
            </div>
        </header>

        <div class="flex bg-[#0f1115] p-1 rounded-xl mb-6 border border-[#2d333b]">
            <button onclick="setMode('random')" id="tab-random" class="tab-btn active flex-1 py-2 rounded-lg transition-all">Random</button>
            <button onclick="setMode('passphrase')" id="tab-passphrase" class="tab-btn flex-1 py-2 rounded-lg transition-all">Passphrase</button>
        </div>

        <div class="output-box mb-4" onclick="copyToClipboard(finalGeneratedPassword)">
            <div id="passwordOutput">Generating...</div>
            <i class="fa-solid fa-copy copy-hint-icon"></i>
        </div>

        <div class="flex items-center gap-3 mb-8">
            <div class="flex-1 flex gap-1.5">
                <div class="strength-segment" id="s1"></div>
                <div class="strength-segment" id="s2"></div>
                <div class="strength-segment" id="s3"></div>
                <div class="strength-segment" id="s4"></div>
            </div>
            <span id="strengthText" class="text-[9px] font-medium text-neutral-500 tracking-tight min-w-[32px] text-right">Fair</span>
        </div>

        <div id="standardSettings" class="space-y-6">
            <div class="space-y-4">
                <div class="flex items-center justify-between px-1">
                    <label class="main-label text-neutral-500 tracking-wide">Length</label>
                    <span id="lengthDisplay" class="text-[#FF5555] font-medium font-mono text-xs">16</span>
                </div>
                <input type="range" id="lengthSlider" min="6" max="50" value="16" class="w-full">
            </div>

            <div class="precision-grid">
                <div class="grid-cell">
                    <div class="cell-label-wrapper">
                        <i class="fa-solid fa-arrow-up-a-z cell-icon"></i>
                        <span class="cell-label">Uppercase</span>
                    </div>
                    <div class="cell-controls">
                        <button onclick="adjustCount('upper', -1)" class="step-btn"><i class="fa-solid fa-minus"></i></button>
                        <span id="upper-count" class="cell-val">2</span>
                        <button onclick="adjustCount('upper', 1)" class="step-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="grid-cell">
                    <div class="cell-label-wrapper">
                        <i class="fa-solid fa-arrow-down-a-z cell-icon"></i>
                        <span class="cell-label">Lowercase</span>
                    </div>
                    <div class="cell-controls">
                        <button onclick="adjustCount('lower', -1)" class="step-btn"><i class="fa-solid fa-minus"></i></button>
                        <span id="lower-count" class="cell-val">2</span>
                        <button onclick="adjustCount('lower', 1)" class="step-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="grid-cell">
                    <div class="cell-label-wrapper">
                        <i class="fa-solid fa-hashtag cell-icon"></i>
                        <span class="cell-label">Numbers</span>
                    </div>
                    <div class="cell-controls">
                        <button onclick="adjustCount('numbers', -1)" class="step-btn"><i class="fa-solid fa-minus"></i></button>
                        <span id="numbers-count" class="cell-val">3</span>
                        <button onclick="adjustCount('numbers', 1)" class="step-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <div class="grid-cell">
                    <div class="cell-label-wrapper">
                        <i class="fa-solid fa-at cell-icon"></i>
                        <span class="cell-label">Symbols</span>
                    </div>
                    <div class="cell-controls">
                        <button onclick="adjustCount('symbols', -1)" class="step-btn"><i class="fa-solid fa-minus"></i></button>
                        <span id="symbols-count" class="cell-val">3</span>
                        <button onclick="adjustCount('symbols', 1)" class="step-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="passphraseSettings" class="hidden space-y-6">
            <div class="space-y-4">
                <div class="flex items-center justify-between px-1">
                    <label class="main-label text-neutral-500 tracking-wide">Words</label>
                    <span id="wordCountDisplay" class="text-[#FF5555] font-medium font-mono text-xs">4</span>
                </div>
                <input type="range" id="wordSlider" min="2" max="10" value="4" class="w-full">
            </div>
            <div class="flex items-center justify-between p-4 bg-[#0f1115] rounded-2xl border border-[#2d333b]">
                <span class="main-label text-neutral-500 tracking-wide">Separator</span>
                <select id="passSeparator" class="bg-transparent text-[11px] font-medium text-neutral-100 outline-none cursor-pointer" onchange="generate()">
                    <option value="-">Hyphen (-)</option>
                    <option value=".">Dot (.)</option>
                    <option value="_">Underscore (_)</option>
                    <option value=" ">Space ( )</option>
                </select>
            </div>
        </div>

        <div class="flex gap-3 mt-10">
            <button onclick="generate()" class="flex-[2] bg-white text-black py-3.5 rounded-xl text-[12px] font-bold tracking-wider flex items-center justify-center gap-2 hover:bg-neutral-200 transition-all active:scale-[0.98]">
                <i class="fa-solid fa-rotate text-[10px]"></i> Generate
            </button>
            <button onclick="copyToClipboard(finalGeneratedPassword)" class="flex-1 bg-[#252a33] text-white py-3.5 rounded-xl text-[12px] font-bold tracking-wider flex items-center justify-center gap-2 hover:bg-[#2d333b] transition-all active:scale-[0.98] border border-[#2d333b]">
                Copy
            </button>
        </div>
    </div>

    <!-- Compact History Box -->
    <div class="history-card" id="historyBox">
        <div class="flex items-center justify-between mb-3 px-1">
            <span class="main-label text-neutral-600 tracking-wide text-[9px] uppercase font-bold">History (Latest 30)</span>
            <button onclick="clearHistory()" class="text-[8px] text-neutral-700 hover:text-red-400 uppercase font-bold transition-colors">Clear All</button>
        </div>
        <div id="historyList">
            <div class="text-[9px] text-neutral-800 text-center py-4 font-mono italic">No recent sessions</div>
        </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard</div>

    <script>
        const words = ["alpha", "bravo", "cloud", "delta", "echo", "frost", "ghost", "hotel", "ivory", "joker", "kilo", "lemon", "magic", "night", "ocean", "pixel", "quartz", "river", "solar", "tiger", "ultra", "vivid", "wolf", "xray", "yoga", "zebra", "active", "brave", "clear", "dark", "early", "fancy", "grand", "high", "iron", "jump", "keen", "light", "mighty", "noble", "open", "pure", "quick", "royal", "sharp", "tough", "urban", "vast", "wild", "zen"];

        let currentMode = 'random';
        let animationInterval = null;
        let finalGeneratedPassword = ""; 
        let history = [];

        const config = { upper: 2, lower: 2, numbers: 3, symbols: 3 };

        const output = document.getElementById('passwordOutput');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthDisplay = document.getElementById('lengthDisplay');
        const wordSlider = document.getElementById('wordSlider');
        const wordDisplay = document.getElementById('wordCountDisplay');
        const historyList = document.getElementById('historyList');

        window.onload = () => generate();

        lengthSlider.oninput = function() {
            lengthDisplay.innerText = this.value;
            validateCounts();
            generate();
        };

        wordSlider.oninput = function() {
            wordDisplay.innerText = this.value;
            generate();
        };

        function adjustCount(type, delta) {
            const totalLength = parseInt(lengthSlider.value);
            const currentTotalRequested = Object.values(config).reduce((a, b) => a + b, 0);
            const newVal = Math.max(0, Math.min(9, config[type] + delta));
            const potentialTotal = (currentTotalRequested - config[type]) + newVal;
            
            if (potentialTotal <= totalLength) {
                config[type] = newVal;
                document.getElementById(`${type}-count`).innerText = newVal;
                generate();
            }
        }

        function validateCounts() {
            const totalLength = parseInt(lengthSlider.value);
            let currentTotal = Object.values(config).reduce((a, b) => a + b, 0);
            while (currentTotal > totalLength) {
                let keys = Object.keys(config).filter(k => config[k] > 0);
                if (keys.length === 0) break;
                let targetKey = keys[0];
                for (let i = 1; i < keys.length; i++) {
                    if (config[keys[i]] > config[targetKey]) targetKey = keys[i];
                }
                config[targetKey]--;
                currentTotal = Object.values(config).reduce((a, b) => a + b, 0);
            }
            Object.keys(config).forEach(k => {
                const el = document.getElementById(`${k}-count`);
                if (el) el.innerText = config[k];
            });
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            const std = document.getElementById('standardSettings');
            const pss = document.getElementById('passphraseSettings');
            if (mode === 'passphrase') {
                std.classList.add('hidden');
                pss.classList.remove('hidden');
            } else {
                std.classList.remove('hidden');
                pss.classList.add('hidden');
            }
            generate();
        }

        function scaleFontSize(length) {
            if (length <= 20) output.style.fontSize = "1.25rem";
            else if (length <= 35) output.style.fontSize = "1.125rem";
            else output.style.fontSize = "1rem";
        }

        function generate() {
            let password = "";
            if (currentMode === 'random') {
                password = generateRandom();
            } else {
                password = generatePassphrase();
            }
            
            if (finalGeneratedPassword && finalGeneratedPassword !== "Generating...") {
                addToHistory(finalGeneratedPassword);
            }
            
            finalGeneratedPassword = password;
            scaleFontSize(password.length);
            matrixRevealEffect(password);
            updateStrength(password);
        }

        function addToHistory(pw) {
            if (history[0] === pw) return; 
            history.unshift(pw);
            if (history.length > 30) history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="text-[9px] text-neutral-800 text-center py-4 font-mono italic">No recent sessions</div>';
                return;
            }
            historyList.innerHTML = history.map(pw => `
                <div class="history-item" onclick="copyToClipboard('${pw}')">
                    <span class="history-text">${pw}</span>
                    <i class="fa-solid fa-copy history-copy-icon"></i>
                </div>
            `).join('');
        }

        function clearHistory() {
            history = [];
            renderHistory();
        }

        function matrixRevealEffect(newPassword) {
            const glyphs = "ABCDEFGHIJKLMNO0123456789!@#$%^&*";
            const frameRate = 14; 
            const revealPerFrame = 1.6; 
            let iteration = 0;
            if (animationInterval) clearInterval(animationInterval);
            animationInterval = setInterval(() => {
                output.innerText = newPassword.split("").map((char, index) => {
                    if (index < iteration) return newPassword[index];
                    return glyphs[Math.floor(Math.random() * glyphs.length)];
                }).join("");
                if (iteration >= newPassword.length) {
                    clearInterval(animationInterval);
                    output.innerText = newPassword;
                }
                iteration += revealPerFrame;
            }, frameRate);
        }

        function generateRandom() {
            const length = parseInt(lengthSlider.value);
            const pools = [
                { name: 'lower', chars: "abcdefghijklmnopqrstuvwxyz" },
                { name: 'upper', chars: "ABCDEFGHIJKLMNOPQRSTUVWXYZ" },
                { name: 'numbers', chars: "0123456789" },
                { name: 'symbols', chars: "!@#$%^&*()_+" }
            ];
            let result = [];
            pools.forEach(p => {
                for (let i = 0; i < config[p.name]; i++) {
                    const char = p.chars.charAt(crypto.getRandomValues(new Uint32Array(1))[0] % p.chars.length);
                    result.push(char);
                }
            });
            const activePools = pools.filter(p => config[p.name] > 0);
            const selectionPools = activePools.length > 0 ? activePools : pools;
            const combinedChars = selectionPools.map(p => p.chars).join("");
            const remaining = Math.max(0, length - result.length);
            if (remaining > 0) {
                const buffer = new Uint32Array(remaining);
                crypto.getRandomValues(buffer);
                for (let i = 0; i < remaining; i++) {
                    result.push(combinedChars.charAt(buffer[i] % combinedChars.length));
                }
            }
            return result.sort(() => Math.random() - 0.5).join("");
        }

        function generatePassphrase() {
            const count = parseInt(wordSlider.value);
            const sep = document.getElementById('passSeparator').value;
            let result = [];
            for (let i = 0; i < count; i++) {
                result.push(words[crypto.getRandomValues(new Uint32Array(1))[0] % words.length]);
            }
            return result.join(sep);
        }

        function updateStrength(pw) {
            let score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 16) score++;
            let variations = 0;
            if (/[a-z]/.test(pw)) variations++;
            if (/[A-Z]/.test(pw)) variations++;
            if (/[0-9]/.test(pw)) variations++;
            if (/[^a-zA-Z0-9]/.test(pw)) variations++;
            if (variations >= 3) score++;
            if (variations >= 4 && pw.length >= 12) score++;
            score = Math.max(1, Math.min(score, 4));

            const gradients = [
                "linear-gradient(90deg, #f87171, #ef4444)",
                "linear-gradient(90deg, #fbbf24, #f59e0b)",
                "linear-gradient(90deg, #34d399, #10b981)",
                "linear-gradient(90deg, #059669, #10b981)"
            ];
            const shadowColors = ["#ef4444", "#f59e0b", "#10b981", "#10b981"];
            const labels = ["Weak", "Fair", "Good", "Secure"];

            ['s1', 's2', 's3', 's4'].forEach((s, i) => {
                const el = document.getElementById(s);
                if (i < score) {
                    el.style.background = gradients[score - 1];
                    el.style.boxShadow = `0 0 12px ${shadowColors[score - 1]}44`;
                } else {
                    el.style.background = "#2d333b";
                    el.style.boxShadow = "none";
                }
            });
            const text = document.getElementById('strengthText');
            text.innerText = labels[score - 1];
            text.style.color = shadowColors[score - 1];
        }

        function copyToClipboard(val) {
            if (!val || val === "Generating...") return;
            const el = document.createElement('textarea');
            el.value = val;
            el.setAttribute('readonly', '');
            el.style.position = 'absolute';
            el.style.left = '-9999px';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
